<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detector</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background-color: #f5f5f5;
        }
        h2 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h2>Upload Image</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Check</button>
</form>

{% if result %}
    <div class="result">
        <h3>Result: {{ result }}</h3>
        <h4>Confidence: {{ confidence }}%</h4>
    </div>
{% endif %}

</body>
</html>
